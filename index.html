<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>#2014 — 1 год! #14pocalypse | ULTRA + EASTER EGG</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            user-select: none;
        }

        body {
            font-family: 'Courier New', 'VT323', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: #050505;
            overflow-x: hidden;
        }

        /* КИРПИЧНАЯ СТЕНА */
        .pixel-wall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            background: linear-gradient(145deg, #0d0a05 0%, #1a1208 100%);
        }
        .pixel-wall::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg,
                    transparent 0px, transparent 15px,
                    rgba(0,0,0,0.25) 15px, rgba(0,0,0,0.25) 16px,
                    transparent 16px, transparent 31px,
                    rgba(0,0,0,0.2) 31px, rgba(0,0,0,0.2) 32px,
                    transparent 32px, transparent 47px,
                    rgba(0,0,0,0.15) 47px, rgba(0,0,0,0.15) 48px),
                repeating-linear-gradient(90deg,
                    #3a2510 0px, #3a2510 1px,
                    transparent 1px, transparent 23px,
                    #2a1a08 23px, #2a1a08 24px,
                    transparent 24px, transparent 47px);
            background-size: 100% 48px;
            filter: brightness(0.65) contrast(1.35);
        }
        .pixel-wall::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                rgba(0,0,0,0.5) 0px, rgba(0,0,0,0.5) 1px,
                transparent 1px, transparent 3px);
            pointer-events: none;
        }

        /* ФОНАРЬ */
        .street-lamp {
            position: fixed;
            bottom: 0;
            left: -8%;
            width: 35%;
            height: 65%;
            z-index: -4;
            pointer-events: none;
        }
        .lamp-post {
            position: absolute;
            bottom: 0;
            left: 18%;
            width: 10px;
            height: 58%;
            background: linear-gradient(90deg, #2a2a2a, #1a1a1a, #2a2a2a);
            box-shadow: 0 0 0 1px #0a0a0a, 0 5px 15px rgba(0,0,0,0.5);
        }
        .lamp-arm {
            position: absolute;
            bottom: 58%;
            left: 18%;
            width: 50px;
            height: 8px;
            background: linear-gradient(0deg, #2a2a2a, #3a3a3a);
            transform: rotate(-18deg);
            transform-origin: left bottom;
            border-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }
        .lamp-light {
            position: absolute;
            bottom: calc(58% - 6px);
            left: calc(18% + 47px);
            width: 16px;
            height: 16px;
            background: #ffdd88;
            border-radius: 50%;
            box-shadow: 0 0 15px 5px rgba(255,200,100,0.9), 0 0 30px 12px rgba(255,180,80,0.5), 0 0 50px 20px rgba(255,160,60,0.2);
            animation: lampFlicker 0.2s infinite alternate;
        }
        @keyframes lampFlicker {
            0% { opacity: 0.85; box-shadow: 0 0 15px 5px rgba(255,200,100,0.7), 0 0 30px 12px rgba(255,180,80,0.4); }
            100% { opacity: 1; box-shadow: 0 0 20px 8px rgba(255,220,120,1), 0 0 40px 18px rgba(255,200,100,0.6); }
        }
        .light-spot {
            position: absolute;
            bottom: -10%;
            left: -30%;
            width: 80%;
            height: 60%;
            background: radial-gradient(ellipse at 30% 100%, rgba(255,200,100,0.35) 0%, rgba(255,180,60,0.15) 25%, transparent 65%);
            pointer-events: none;
            filter: blur(3px);
        }
        .warm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 25% 80%, rgba(255,180,80,0.15) 0%, rgba(255,140,40,0.07) 30%, transparent 70%);
            pointer-events: none;
            z-index: -3;
        }

        /* ГРАФФИТИ */
        .graffiti {
            position: fixed;
            z-index: -2;
            pointer-events: none;
            white-space: nowrap;
        }
        .graffiti-1 {
            top: 3%;
            left: -4%;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(60px, 14vw, 190px);
            color: #ff3366;
            text-shadow: 6px 6px 0 #661133, 12px 12px 0 #330822, 18px 18px 30px rgba(0,0,0,0.7);
            transform: rotate(-4deg);
            opacity: 0.92;
            letter-spacing: 8px;
        }
        .graffiti-2 {
            bottom: 2%;
            right: -7%;
            font-family: 'Silkscreen', monospace;
            font-size: clamp(50px, 11vw, 150px);
            color: #44ffaa;
            text-shadow: 5px 5px 0 #116633, 10px 10px 0 #0a4422, 15px 15px 25px rgba(0,0,0,0.6);
            transform: rotate(3deg);
            letter-spacing: 5px;
            opacity: 0.88;
        }
        .graffiti-3 {
            bottom: 22%;
            left: -9%;
            font-family: 'VT323', monospace;
            font-size: clamp(65px, 15vw, 200px);
            color: #ffbb44;
            text-shadow: 5px 5px 0 #664400, 10px 10px 0 #442200;
            transform: rotate(-7deg);
            letter-spacing: 10px;
            opacity: 0.7;
        }
        .graffiti-4 {
            top: 45%;
            right: -13%;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(45px, 10vw, 120px);
            color: #dd55ff;
            text-shadow: 4px 4px 0 #551188, 8px 8px 0 #331166;
            transform: rotate(7deg);
            letter-spacing: 4px;
            opacity: 0.65;
        }
        .graffiti-5 {
            top: 75%;
            right: 3%;
            font-family: 'Silkscreen', monospace;
            font-size: 28px;
            color: #ff9944;
            text-shadow: 3px 3px 0 #442200;
            transform: rotate(-12deg);
            opacity: 0.55;
            letter-spacing: 3px;
        }
        .graffiti-5::before { content: "✪ "; }

        .pixel-tag {
            position: fixed;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: rgba(255,255,200,0.4);
            transform: rotate(-12deg);
            pointer-events: none;
            z-index: -2;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        .tag-1 { top: 12%; right: 3%; font-size: 11px; transform: rotate(5deg); }
        .tag-2 { bottom: 30%; left: 2%; font-size: 9px; transform: rotate(-15deg); }
        .tag-3 { top: 55%; left: 6%; font-size: 10px; transform: rotate(8deg); }
        .tag-4 { bottom: 12%; right: 10%; font-size: 8px; transform: rotate(-5deg); }
        .tag-5 { top: 25%; left: 1%; font-size: 9px; transform: rotate(-20deg); }
        .tag-6 { bottom: 45%; right: 2%; font-size: 8px; transform: rotate(10deg); }

        /* КАРТОЧКА */
        .card {

            position: relative;
            margin: 20px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);

        .card:hover {
            box-shadow: 0 0 60px rgba(240, 179, 75, 0.45), 18px 18px 0 rgba(0,0,0,0.5);

            transform: translateY(-3px);

        .hashtag {
            font-size: 4rem;
            background: linear-gradient(135deg, #ffeaac, #ffaa44, #ff6600);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            letter-spacing: 8px;
            font-family: 'Press Start 2P', monospace;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .hashtag:active { transform: scale(0.98); }

        .sub {
            font-size: 1.4rem;
            color: #ffdd99;
            background: rgba(0,0,0,0.7);

            font-family: 'VT323', monospace;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        h1 {
            font-size: 1.6rem;
            margin: 20px 0;
            color: #ffffff;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(30,20,10,0.8));

        }
        .photo-container {
            margin: 25px auto;

        .crew-photo { max-width: 100%; display: block; border-radius: 12px; filter: contrast(1.05) brightness(1.02); }

        /* ПЛЕЕР */
        .music-player {
            background: rgba(0,0,0,0.9);
            border: 2px solid #f7c56e;
            padding: 22px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(247,197,110,0.2);
        }
        .album-art {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 3px solid #f7c56e;

            align-items: center;
            justify-content: center;
            font-size: 60px;

            box-shadow: 0 0 20px rgba(247,197,110,0.3);
            transition: all 0.3s;
        }
        .album-art.playing { animation: vinylPulse 0.8s infinite alternate; }
        @keyframes vinylPulse {
            0% { box-shadow: 0 0 10px rgba(247,197,110,0.3); transform: scale(1); }
            100% { box-shadow: 0 0 35px rgba(247,197,110,0.7); transform: scale(1.02); }
        }
        .track-title {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffeaac, #ffaa44);
            -webkit-background-clip: text;

            color: transparent;
            font-family: 'Press Start 2P', monospace;
            margin-bottom: 5px;

        .track-artist { font-size: 0.9rem; color: #ccaa66; margin-bottom: 15px; font-family: 'VT323', monospace; }
        .equalizer { display: flex; justify-content: center; align-items: flex-end; gap: 6px; margin: 15px 0; height: 45px; }
        .eq-bar { width: 8px; background: linear-gradient(0deg, #ffaa44, #ffdd88); border-radius: 4px; transition: height 0.06s ease; }
        .progress-container { display: flex; align-items: center; gap: 12px; margin: 15px 0; }
        .current-time, .duration { font-size: 0.75rem; color: #ccaa66; font-family: monospace; min-width: 42px; }
        .progress-bar { flex: 1; height: 8px; background: rgba(255,255,200,0.2); border-radius: 4px; cursor: pointer; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #f7c56e, #ffaa44); border-radius: 4px; position: relative; box-shadow: 0 0 6px #ffaa44; }
        .progress-fill::after { content: ""; width: 14px; height: 14px; background: #f7c56e; border-radius: 50%; position: absolute; right: -7px; top: -3px; box-shadow: 0 0 8px #ffaa44; }
        .karaoke { font-size: 0.9rem; color: #ffdd99; text-align: center; margin: 10px 0; font-family: 'VT323', monospace; letter-spacing: 2px; text-shadow: 0 0 5px rgba(255,221,153,0.3); }
        .karaoke .active-word { color: #ffaa44; text-shadow: 0 0 8px #ffaa44; font-weight: bold; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 20px 0; }
        .control-btn {
            background: rgba(0,0,0,0.7);

            transition: all 0.1s;
        }

        .control-btn.play-pause {

        .volume-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(247,197,110,0.3); }
        .volume-icon { color: #ffeaac; font-size: 1rem; cursor: pointer; transition: 0.1s; }

        .message {
            background: rgba(0,0,0,0.8);
            padding: 18px;
            margin: 20px 0;
            border: 1px solid #f7c56e;

            color: #fff5e0;
            backdrop-filter: blur(4px);
            font-family: 'VT323', monospace;
            border-radius: 16px;
        }
        .stats { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin: 24px 0; }
        .stat {
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border: 1px solid #f0b34b;
            color: #ffefb0;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .stat:hover { transform: scale(1.05); border-color: #ffdd88; }
        .stat span { color: #ffcd74; font-size: 2rem; font-weight: bold; margin-right: 10px; font-family: 'Press Start 2P', monospace; }

        .pixel-vinyl {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 35% 35%, #3a2a18, #0a0a02);
            margin: 20px auto;
            border: 3px solid #f7c56e;
            position: relative;
            cursor: pointer;
            animation: spinPixel 5s infinite linear;
            box-shadow: 0 0 20px rgba(247,197,110,0.4);
            border-radius: 50%;
            transition: all 0.1s;
        }
        .pixel-vinyl:active { transform: scale(0.97); }
        @keyframes spinPixel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pixel-vinyl::after {
            content: "♫";

            position: absolute;

            left: 34px;

            transform: translateX(-50%) scale(1);

        .glitch-effect {
            animation: glitch 0.2s infinite;

        @keyframes glitch {
            0% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }

            100% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
