<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>#2014 — 1 год! #14pocalypse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        body {
            background: var(--tg-theme-bg-color, #0c0f1c);
            font-family: 'Courier New', 'VT323', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.2s;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color, #0a0e17);
            padding: 32px 24px 38px;
            text-align: center;
            border: 4px solid var(--tg-theme-button-color, #f0b34b);
            box-shadow: 12px 12px 0 rgba(0,0,0,0.3);
            position: relative;
            margin: 16px;
        }

        .hashtag {
            font-size: 3.8rem;
            font-weight: bold;
            color: var(--tg-theme-text-color, #ffe0a3);
            text-shadow: 4px 4px 0 #7a4f1a;
            letter-spacing: 6px;
        }

        .sub {
            font-size: 1.3rem;
            color: var(--tg-theme-text-color, #ffdd99);
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 6px 14px;
            margin-bottom: 20px;
            border: 2px solid var(--tg-theme-button-color, #f0b34b);
            font-weight: bold;
        }

        h1 {
            font-size: 1.5rem;
            margin: 20px 0;
            color: var(--tg-theme-text-color, #ffffff);
            background: rgba(0,0,0,0.5);
            padding: 12px;
            border-left: 10px solid var(--tg-theme-button-color, #f7c56e);
        }

        .photo-container {
            margin: 25px auto;
            border: 5px solid var(--tg-theme-button-color, #f0b34b);
            padding: 8px;
            background: #000000;
            display: inline-block;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.4);
        }

        .crew-photo {
            max-width: 100%;
            display: block;
        }

        .message {
            background: rgba(0,0,0,0.7);
            padding: 18px;
            margin: 20px 0;
            border: 2px solid var(--tg-theme-button-color, #f7c56e);
            font-size: 1.1rem;
            color: var(--tg-theme-text-color, #fff2cf);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 24px 0;
        }

        .stat {
            background: rgba(0,0,0,0.6);
            padding: 8px 18px;
            border: 2px solid var(--tg-theme-button-color, #f0b34b);
            font-weight: bold;
            color: var(--tg-theme-text-color, #ffefb0);
            font-size: 1.1rem;
        }

        .stat span {
            color: #ffcd74;
            font-size: 1.8rem;
            font-weight: bold;
            margin-right: 8px;
        }

        .pixel-vinyl {
            width: 90px;
            height: 90px;
            background: #1e1a10;
            margin: 16px auto;
            border: 4px solid var(--tg-theme-button-color, #f7c56e);
            position: relative;
            cursor: pointer;
            animation: spinPixel 5s infinite linear;
        }

        @keyframes spinPixel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pixel-vinyl::after {
            content: "♫";
            font-size: 32px;
            position: absolute;
            top: 24px;
            left: 26px;
            color: #ffcf6e;
        }

        .music-player {
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--tg-theme-button-color, #f7c56e);
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .track-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffeaac;
            margin-bottom: 5px;
        }

        .track-artist {
            font-size: 0.9rem;
            color: #ccaa66;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            margin: 10px 0;
            background: #1f1b10;
            border-radius: 4px;
        }

        .btn {
            background: #1f1b10;
            border: 3px solid var(--tg-theme-button-color, #f7c56e);
            color: var(--tg-theme-text-color, #ffeaac);
            padding: 10px 28px;
            margin: 10px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
            transition: 0.05s linear;
        }

        .btn:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0 rgba(0,0,0,0.3);
        }

        .members {
            margin: 25px 0 15px;
            font-size: 1rem;
            color: var(--tg-theme-text-color, #eeddbb);
            background: rgba(0,0,0,0.6);
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }

        .bottom-image {
            margin: 30px 0 10px;
            border: 3px solid var(--tg-theme-button-color, #f0b34b);
            padding: 6px;
            background: #000;
            display: inline-block;
        }

        .bottom-image img {
            max-width: 100%;
            display: block;
        }

        footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #aa9944;
            padding-top: 16px;
        }

        .tg-close {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--tg-theme-button-color, #f0b34b);
            color: var(--tg-theme-button-text-color, #000);
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            font-size: 14px;
        }
        
        @media (max-width: 560px) {
            .card { padding: 20px 14px; }
            .hashtag { font-size: 2.6rem; }
            h1 { font-size: 1.2rem; }
            .btn { font-size: 0.9rem; padding: 6px 16px; }
            .track-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="hashtag">#2014</div>
    <div class="sub">14.06.2025 - ?</div>
    <h1>🔥 #2014 — ЭТО НЕ ПРОСТО ТЕГ, ЭТО ЛАЙФСТАЙЛ 🔥</h1>
    
    <!-- ФОТОГРАФИЯ -->
    <div class="photo-container">
        <img class="crew-photo" src="https://iili.io/CBdX5NI.png" alt="#2014 Crew">
    </div>

    <!-- МУЗЫКАЛЬНЫЙ ПЛЕЕР -->
    <div class="music-player">
        <div class="track-title">#14pocalypse</div>
        <div class="track-artist">#2014 Crew</div>
        <audio controls>
            <source src="https://s1ddenly.github.io/tg-webapp-2014/audio/2014-anthem.mp3" type="audio/mpeg">
            Твой браузер не поддерживает аудио-плеер
        </audio>
    </div>
    
    <div class="message">
        🎧 #14pocalypse — нажми на кнопку, чтобы быть вместе с нами 🎧<br>
        🔥 Ты с нами уже целый год! 🔥
    </div>
    
    <div class="stats">
        <div class="stat"><span>1</span> год</div>
        <div class="stat"><span>12</span> месяцев</div>
        <div class="stat"><span>365</span> дней</div>
    </div>
    
    <div class="pixel-vinyl" id="vinylPlayer"></div>
    
    <div>
        <button class="btn" id="celebrateBtn">🎮 1 ГОД!</button>
        <button class="btn" id="sendDataBtn">📤 БЫТЬ С #2014</button>
    </div>
    
    <div class="members">
        <span>@ninthsin</span> · <span>@mynt</span> · <span>@uppedkid</span> · <span>@kingstrals</span> · <span>@vaniaxx</span>
    </div>
    
    <div class="bottom-image">
        <img src="https://iili.io/CBTsUaR.md.jpg" alt="#2014">
    </div>
    
    <footer>#14pocalypse<br><span style="font-size:0.7rem;">by ninthsin</span></footer>
</div>
<button class="tg-close" id="closeBtn">✖ ЗАКРЫТЬ</button>

<script>
    let tg;
    try {
        tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        console.log("Telegram Web App готов");
    } catch(e) {
        console.log("Ошибка Telegram Web App:", e);
        tg = {
            expand: function(){},
            ready: function(){},
            sendData: function(d){ console.log("Данные для бота:", d); },
            showAlert: function(m){ alert(m); },
            close: function(){ window.close(); },
            openTelegramLink: function(url){ window.open(url, '_blank'); },
            HapticFeedback: { impactOccurred: function(){} },
            initDataUnsafe: { user: { username: "тестер" } },
            themeParams: { bg_color: "#0c0f1c" }
        };
    }

    // Кнопка отправки данных боту
    document.getElementById('sendDataBtn').onclick = () => {
        try {
            const userName = tg.initDataUnsafe?.user?.username || 'друг';
            tg.sendData(JSON.stringify({
                action: 'greeting',
                user: userName,
                message: 'Я с #2014!'
            }));
            tg.showAlert('Спасибо! Ты с нами! #14pocalypse 🎉');
        } catch(e) {
            console.error("Ошибка отправки:", e);
            tg.showAlert('Ошибка, но мы всё равно рады тебе! 🔥');
        }
    };

    // Кнопка празднования
    document.getElementById('celebrateBtn').onclick = () => {
        showConfetti(40);
        const msgDiv = document.querySelector('.message');
        if (msgDiv) {
            const original = msgDiv.innerHTML;
            msgDiv.innerHTML = '🎉 #2014 — 1 ГОД! #14pocalypse 🎉<br>🔥 ТЫ ЧАСТЬ НАШЕЙ ИСТОРИИ! 🔥<br>👥 @ninthsin, @mynt, @uppedkid, @kingstrals, @vaniaxx';
            setTimeout(() => { 
                if (msgDiv) msgDiv.innerHTML = original; 
            }, 2500);
        }
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    };

    // Конфетти
    function showConfetti(count = 40) {
        const chars = ['■', '♦', '♥', '♫', '♪', '●', '◆'];
        for (let i = 0; i < count; i++) {
            const el = document.createElement('div');
            el.innerText = chars[Math.floor(Math.random() * chars.length)];
            el.style.position = 'fixed';
            el.style.left = Math.random() * 100 + '%';
            el.style.top = '-50px';
            el.style.fontSize = (Math.random() * 24 + 16) + 'px';
            el.style.color = Math.random() > 0.5 ? '#ffcf6e' : '#b0ff90';
            el.style.pointerEvents = 'none';
            el.style.zIndex = '9999';
            el.style.opacity = '0.95';
            el.style.transition = 'transform 2.5s linear, opacity 2s';
            document.body.appendChild(el);
            
            setTimeout(() => {
                el.style.transform = `translateY(${window.innerHeight + 80}px) rotate(${Math.random() * 360}deg)`;
                el.style.opacity = '0';
            }, 10);
            
            setTimeout(() => {
                if (el && el.remove) el.remove();
            }, 2600);
        }
    }

    // Винил — управление плеером (play/pause)
    const audioPlayer = document.querySelector('audio');
    const vinyl = document.getElementById('vinylPlayer');
    if (vinyl && audioPlayer) {
        vinyl.onclick = () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            } else {
                audioPlayer.pause();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        };
    }

    // Кнопка закрытия
    document.getElementById('closeBtn').onclick = () => {
        tg.close();
    };

    // Адаптация под тему Telegram
    if (tg.onEvent) {
        tg.onEvent('themeChanged', () => {
            document.body.style.backgroundColor = tg.themeParams.bg_color || '#0c0f1c';
        });
    }
    
    console.log("Страница #2014 с музыкой загружена!");
</script>
</body>
</html>
